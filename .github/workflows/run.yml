name: AI News Push

on:
  schedule:
    - cron: '0 1 * * *'  # UTC 1点 = 中国时间 9点
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install feedparser requests transformers torch sentencepiece protobuf --quiet

      - name: Check Python version
        run: python --version

      - name: Run AI news script
        run: python main.py
