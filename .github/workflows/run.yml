name: AI News Push

# 定时触发和手动触发
on:
  schedule:
    - cron: '0 1 * * *'  # UTC 1点 = 中国时间 9点
  workflow_dispatch: # 可手动触发

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      # 拉取仓库代码
      - uses: actions/checkout@v3

      # 安装 Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      # 安装依赖
      - name: Install dependencies
        run: |
          pip install feedparser requests transformers torch --quiet

      # 执行脚本
      - name: Run AI news script
        run: python main.py
